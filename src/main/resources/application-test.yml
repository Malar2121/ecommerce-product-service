# Test profile — disables infrastructure auto-configuration so unit/smoke tests
# run without PostgreSQL or RabbitMQ. Integration tests will override this later.

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

logging:
  level:
    root: WARN
    com.swst41062.ecommerce.product: INFO

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
